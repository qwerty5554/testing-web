stages:
  - build

build-docker:
  stage: build
  image: docker:24.0.5

  services:
    - name: docker:24.0.5-dind
      command: ["--insecure-registry=10.0.2.15:5050"]

  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""

  before_script:
    - docker info

  script:
    - sh build-docker/build.sh

  only:
    - develop
    - master
