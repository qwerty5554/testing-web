stages:
  - build

build-docker:
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  stage: build
  image: docker:latest
  only:
    - master
    - develop
  services:
    - name: docker:dind
      command:
        - /bin/sh
        - -c
        - echo "$TLS_CA_CERT" > /usr/local/share/ca-certificates/my-ca.crt && update-ca-certificates && dockerd-entrypoint.sh || exit
  before_script:
    - echo Show environment variables
    - export
    - echo Show DIND Docker info
    - docker info
  script:
    - build-docker/build.sh
