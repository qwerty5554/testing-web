stages:
  - build

build-docker:
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    TLS_CA_CERT: "$TLS_CA_CERT"
  stage: build
  image: docker:latest
  only:
    - master
    - develop
  services:
  - name: docker:dind
    command:
      - /bin/sh
      - -c
      - |
        echo "$TLS_CA_CERT" > /usr/local/share/ca-certificates/my-ca.crt
        update-ca-certificates
        dockerd-entrypoint.sh --insecure-registry=10.0.2.15:5050
  before_script:
    - echo Show environment variables
    - export
    - echo Show DIND Docker info
    - docker info
  script:
    - build-docker/build.sh
